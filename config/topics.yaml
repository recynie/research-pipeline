# =============================================================================
# Research Pipeline — Topic Configuration
# =============================================================================
# Customize this file to control which arXiv papers are discovered.
#
# Each topic defines:
#   - name:              Internal identifier (use snake_case, no spaces)
#   - display_name:      Human-readable name shown on the website
#   - search_query:      arXiv API search string (supports full query syntax:
#                         boolean operators, category filters like cat:cs.RO, etc.)
#   - max_results:       Max papers to fetch per run (1–100; default 20)
#   - abstract_contains: ALL of these strings must appear in the abstract
#                         (case-insensitive). Set to [] to disable.
#   - any_keyword:       AT LEAST ONE of these strings must appear in the
#                         abstract (case-insensitive). Set to [] to disable.
#
# To add your own research area, append a new entry to the 'topics' list.
# =============================================================================

topics:
  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  Auto Scientific Research — Agent-driven Scientific Discovery          ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  - name: "auto_scientific_discovery"
    display_name: "Auto Scientific Research"
    search_query: "cat:cs.AI AND (\"autonomous scientific discovery\" OR \"AI scientist\" OR \"scientific discovery agent\" OR EurekAgent OR \"automated research\" OR \"self-driving lab\")"
    max_results: 30
    abstract_contains: []
    any_keyword:
      - "scientific discovery"
      - "AI scientist"
      - "autonomous research"
      - "self-driving"

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  Self-Evolving / Self-Improving Agents                                 ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  - name: "self_evolving_agent"
    display_name: "Self-Evolving Agents"
    search_query: "cat:cs.AI AND (\"self-evolving\" OR \"self-improving\" OR \"self-evolution\") AND agent"
    max_results: 25
    abstract_contains: []
    any_keyword:
      - "self-evolv"
      - "self-improv"
      - "self-evolution"
      - "agent"

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  LLM Agent for Scientific Applications                                 ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  - name: "llm_agent_science"
    display_name: "LLM Agents for Science"
    search_query: "cat:cs.AI AND (agent OR agentic) AND (science OR scientific OR research) AND (LLM OR \"language model\")"
    max_results: 30
    abstract_contains: []
    any_keyword:
      - "agent"
      - "agentic"
      - "scientific"
      - "research"
      - "science"

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  AI for Protein / Molecule Design & Optimization                       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  - name: "ai_for_molecular_design"
    display_name: "AI for Molecular & Protein Design"
    search_query: "cat:cs.AI AND (protein OR molecule) AND (agent OR \"language model\") AND (design OR optimization OR generation)"
    max_results: 30
    abstract_contains: []
    any_keyword:
      - "protein"
      - "molecule"
      - "molecular"
      - "drug"

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  Knowledge Evolution / Code as Knowledge                               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  - name: "knowledge_evolution"
    display_name: "Knowledge Evolution & Code-as-Knowledge"
    search_query: "cat:cs.AI AND (\"knowledge evolution\" OR \"knowledge base\" OR \"code knowledge\" OR \"skill library\" OR \"knowledge accumulation\") AND (agent OR evolving OR self-improving)"
    max_results: 20
    abstract_contains: []
    any_keyword:
      - "knowledge evolution"
      - "knowledge base"
      - "skill"
      - "code"

