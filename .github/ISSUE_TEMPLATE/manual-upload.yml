name: Manual Paper Upload
description: Manually upload a PDF paper, add to favorites, and generate summary card + podcast
title: "[Manual Upload] "
body:
  - type: input
    id: paper_title
    attributes:
      label: Paper Title
      description: Full title of the paper
      placeholder: "Dexterous Grasping with Reinforcement Learning"
    validations:
      required: true
  - type: input
    id: authors
    attributes:
      label: Authors
      description: Comma-separated list of authors
      placeholder: "John Smith, Jane Doe, Bob Wilson"
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      description: Research topic category
      options:
        - "grasp"
        - "manipulation"
        - "tactile"
        - "learning"
        - "planning"
        - "perception"
        - "control"
        - "other"
    validations:
      required: true
  - type: textarea
    id: abstract
    attributes:
      label: Abstract
      description: Paper abstract (optional — will be extracted from PDF if left blank)
      placeholder: "We present a novel approach to..."
  - type: input
    id: published_date
    attributes:
      label: Published Date
      description: Publication date (YYYY-MM-DD). Defaults to today if empty.
      placeholder: "2026-06-11"
  - type: textarea
    id: pdf_attachment
    attributes:
      label: PDF File
      description: |
        **Drag and drop your PDF file here** to attach it to this issue.

        Alternatively, if the PDF is already in the repository's `_uploads/` folder, just enter the filename (e.g., `my_paper.pdf`).
      placeholder: "Drag your PDF here, or enter the filename if already in _uploads/"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes (optional)
      description: Any specific aspects you'd like the summary or podcast to focus on?
