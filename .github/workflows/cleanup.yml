name: Cleanup Old Papers

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cleanup
        run: python scripts/cleanup.py

      - name: Commit if changes
        run: |
          git config user.name "research-pipeline-bot"
          git config user.email "bot@research-pipeline.local"
          if ! git diff --quiet HEAD; then
            git add -A
            git commit -m "cleanup: removed stale uninteresting papers [skip ci]"
            git push
          else
            echo "No stale papers to clean up."
          fi
